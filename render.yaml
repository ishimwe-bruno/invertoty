services:
  - type: web
    name: invertory
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_SYNC_ON_START
        value: "true"
      - key: DB_SYNC_FORCE
        value: "false"
